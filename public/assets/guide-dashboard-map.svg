<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Annotated dashboard overview</title>
  <desc id="desc">A simplified dashboard screenshot map with numbered callouts for source, filters, KPI, summary chart, focus lanes, and guide navigation.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f2b33" flood-opacity="0.16"/>
    </filter>
    <style>
      .screen { fill: #f6f8f7; stroke: #cfdad6; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #d8e1dd; stroke-width: 1; }
      .muted { fill: #64717b; font: 500 15px "Segoe UI", Arial, sans-serif; }
      .small { fill: #52606a; font: 600 13px "Segoe UI", Arial, sans-serif; }
      .label { fill: #1e2933; font: 800 16px "Segoe UI", Arial, sans-serif; }
      .tiny { fill: #6b7780; font: 600 11px "Segoe UI", Arial, sans-serif; }
      .callout { fill: #145f46; stroke: #ffffff; stroke-width: 4; }
      .calltext { fill: #ffffff; font: 900 18px "Segoe UI", Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .line { stroke: #145f46; stroke-width: 3; stroke-linecap: round; fill: none; }
      .accent { fill: #e8f5ef; stroke: #93c8b5; stroke-width: 1; }
      .warn { fill: #fff3d8; stroke: #e7be72; stroke-width: 1; }
      .bar1 { fill: #6db59a; }
      .bar2 { fill: #e2a95f; }
      .bar3 { fill: #c65f5f; }
    </style>
  </defs>

