  <text x="1100" y="555" class="small">3 TEU</text>
  <rect x="862" y="580" width="336" height="48" rx="8" class="panel"/>
  <text x="884" y="602" class="tiny">Booking / B/L Numbers</text>
  <text x="884" y="620" class="small">CN****** | SHAP****** | 3 TEU</text>

  <path d="M738 184 L736 206" class="line"/>
  <circle cx="738" cy="184" r="16" class="callout"/><text x="738" y="184" class="calltext">1</text>
  <path d="M242 276 L242 304" class="line"/>
  <circle cx="242" cy="276" r="16" class="callout"/><text x="242" y="276" class="calltext">2</text>
  <path d="M824 320 L864 274" class="line"/>
  <circle cx="824" cy="320" r="16" class="callout"/><text x="824" y="320" class="calltext">3</text>
  <path d="M1220 406 L1198 424" class="line"/>
  <circle cx="1220" cy="406" r="16" class="callout"/><text x="1220" y="406" class="calltext">4</text>
  <path d="M1220 496 L1198 496" class="line"/>
  <circle cx="1220" cy="496" r="16" class="callout"/><text x="1220" y="496" class="calltext">5</text>
  <path d="M1220 604 L1198 604" class="line"/>
  <circle cx="1220" cy="604" r="16" class="callout"/><text x="1220" y="604" class="calltext">6</text>
</svg>
