  <text x="882" y="354" class="tiny">Registered O/F</text>
  <text x="882" y="376" class="small">$725</text>
  <rect x="1038" y="332" width="160" height="52" rx="8" class="panel"/>
  <text x="1058" y="354" class="tiny">Benchmark</text>
  <text x="1058" y="376" class="small">$1,136</text>

  <rect x="862" y="398" width="336" height="64" rx="9" class="active"/>
  <text x="884" y="422" class="tiny">Linked TEU</text>
  <text x="884" y="446" class="small">Bookings 6 | B/L 6 | 13 TEU</text>
  <text x="1060" y="435" class="tiny">Open</text>

  <rect x="862" y="476" width="336" height="44" rx="8" class="selected"/>
  <text x="884" y="503" class="small">CKI | KNC / 2605S</text>
  <text x="1100" y="503" class="small">5 TEU</text>
  <rect x="862" y="528" width="336" height="44" rx="8" class="panel"/>
