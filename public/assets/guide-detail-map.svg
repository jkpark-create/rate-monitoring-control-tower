  <rect x="100" y="374" width="82" height="22" rx="11" class="danger"/>
  <text x="113" y="389" class="tiny">Market</text>
  <text x="210" y="390" class="small">CN******</text>
  <text x="336" y="390" class="small">TAO CN -&gt; INC KR</text>
  <text x="512" y="390" class="small">$270</text>
  <text x="638" y="390" class="small">-34%</text>

  <rect x="80" y="422" width="704" height="54" rx="8" class="panel"/>
